{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-3">Редактировать товар #{{ item.id }}</h1>
        <form action="/edit-parsed/{{ item.id }}" method="post">
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input class="form-control" name="title" value="{{ item.title or '' }}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Цена</label>
                <input class="form-control" name="price" type="number" step="0.01" value="{{ item.price }}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Ссылка</label>
                <input class="form-control" name="url" value="{{ item.url or '' }}" />
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/parsed" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
